
name: 'N4 - Execução da pipeline de CI'

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}
  schedule:
    # Roda a cada 30 minutos
    - cron: '*/30 * * * *'

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Prepare report folder
        run: mkdir -p reports

      - name: Run tests (HTML report)
        run: npx mocha --reporter mochawesome --reporter-options reportDir=reports,reportFilename=mochawesome,quiet=true

      - name: Upload HTML test report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: mochawesome-report
          path: reports/**
